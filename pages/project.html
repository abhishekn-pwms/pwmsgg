<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project GG Master</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">
                        Project Master GG
                    </div>
                    <button class="btn btn-primary" onclick="newProject()">
                        + New Project
                    </button>
                </div>

                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box" placeholder="Search Project..." onkeyup="renderProjectGrid()">
                    <select id="statusFilter" onchange="renderProjectGrid()">
                        <option value="Enabled" selected>Enabled</option>
                        <option value="Disabled">Disabled</option>
                        <option value="All">All</option>
                    </select>
                    <select id="projectStatusFilter" onchange="renderProjectGrid()"></select>
                </div>

                <div id="projectCount" style="margin-bottom:10px; color:#666; font-size:14px;"></div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Project Name</th>
                                <th>Portfolio</th>
                                <th>Status</th>
                                <th>Start Date</th>
                                <th>Target Date</th>
                                <th>Enabled</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="projectGrid"></tbody>
                    </table>
                </div>

            </div>

        </div> <div id="footer"></div>

    </div>

    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h2>Project</h2>
            <input type="hidden" id="projectId">

            <div class="form-row">
                <label>Portfolio</label>
                <select id="portfolioId"></select>
            </div>

            <div class="form-row">
                <label>Project Code</label>
                <input id="projectCode">
            </div>

            <div class="form-row">
                <label>Project Name</label>
                <input id="projectName">
            </div>

            <div class="form-row">
                <label>Description</label>
                <textarea id="description"></textarea>
            </div>

            <div class="form-row">
                <label>Start Date</label>
                <input type="date" id="startDate">
            </div>

            <div class="form-row">
                <label>Target Date</label>
                <input type="date" id="targetDate">
            </div>

            <div class="form-row">
                <label>Status</label>
                <select id="projectStatus"></select>
            </div>

            <div class="form-row">
                <label>
                    <input type="checkbox" id="enabled" checked> Enabled
                </label>
            </div>

            <button class="btn btn-primary" onclick="saveProject()">Save</button>
            <button class="btn btn-secondary" onclick="closeModal('projectModal')">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/project.js"></script>

    <script>initializeAppIcon();</script>

</body>
</html>
