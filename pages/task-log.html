<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Log GG</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">
                        Task Log GG
                    </div>
                    <button class="btn btn-primary" onclick="newTaskLog()">
                        + New Task Log
                    </button>
                </div>


                <!-- Split layout configuration parameters -->
                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box" 
                    placeholder="Search Task Description..." onkeyup="refreshTaskLogView()">
                    <select id="periodFilter" onchange="applyPeriodFilter()">
                        <option value="Today">Today</option>
                        <option value="This Week">This Week</option>
                        <option value="This Month">This Month</option>
                        <option value="All">All</option>
                    </select>
                    <input type="date" id="fromDate" onchange="refreshTaskLogView()">
                    <input type="date" id="toDate" onchange="refreshTaskLogView()">
                    <select id="activityStatusFilter" onchange="refreshTaskLogView()"></select>
                </div>


                <div style="margin-bottom:10px; display:flex; gap:20px; font-size:14px; font-weight:bold;">
                    <div id="totalRecords">Total Records: 0</div>
                    <div id="totalMinutes">Total Minutes: 0</div>
                    <div id="totalHours">Total Hours: 0.0</div>
                </div>

                <table id="taskLogTable" class="data-table" style="display:none;">
                    <colgroup>
                        <col style="width:9%">
                        <col style="width:38%">
                        <col style="width:18%">
                        <col style="width:6%">
                        <col style="width:6%">
                        <col style="width:6%">
                        <col style="width:17%">
                        <col style="width:10%">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Task Description</th>
                            <th>Activity</th>
                            <th>Minutes</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Context</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taskLogGrid"></tbody>
                </table>
                <div id="taskLogFeed"></div>
                </div> </div> <div id="footer"></div>

    </div>

    <div id="taskLogModal" class="modal">
        <div class="modal-content">
            <h2>Task Log</h2>
            <input type="hidden" id="taskLogId">

            <div class="toolbar">
                <label style="max-width:45%;">Task Description</label>
                <small style="max-width:25%; text-align:right;" id="charCount">0 / 1000</small>
                <label style="max-width:30%; text-align:center;">Date</label>
            </div>

            <div class="toolbar">
                <textarea style="min-height:30px; min-width:70%;" id="taskDescription" rows="2" maxlength="1000"></textarea>
                <input style="text-align:right;" type="date" id="taskDate">
            </div>


            <div class="toolbar">
                    <label style="max-width:10%;">Activity: </label>
                    <select id="activityId" style="max-width:51%;" onchange="activityChanged()"></select>
                    &nbsp;&nbsp;
                    <label style="font-size:10px; max-width:15%; text-align:right;">Search Activity: </label>
                    <input type="search" style="max-width:25%;" id="activitySearch" placeholder="Search..." onkeyup="filterActivities()">
            </div>


            <div class="toolbar">
                <label style="max-width:15%;">Context:&nbsp;&nbsp;</label>
                <label id="activityContext" style="padding:5px; background:#f8f9fa; border:1px solid #ddd; border-radius:4px; font-size:11px;">
                    Select Activity
                </label>
            </div>

            <div id="newActivitySection" style="display:none;">
                <hr>
                <h4 style="margin:10px 0;">New Activity</h4>
                <div class="form-row time-row">
                    <div>
                        <label>Activity Name</label>
                        <input id="newActivityName">
                    </div>
                    <div>
                        <label>Milestone</label>
                        <select id="newActivityMilestone"></select>
                    </div>
                </div>
                <div class="form-row time-row">
                    <div>
                        <label>Target Date</label>
                        <input type="date" id="newActivityTargetDate">
                    </div>
                    <div>
                        <label>Priority</label>
                        <select id="newActivityPriority"></select>
                    </div>
                </div>
            </div>


            <div class="toolbar">
                <label style="max-width:8%;">Start:&nbsp;</label>
                <input type="time" id="startTime" onchange="calculateTimeFields()" style="max-width:25%;">
                    
                &nbsp;

                <label style="max-width:12%; text-align:right;">Mins:&nbsp;</label>
                <input type="number" id="minutesSpent" min="0" value="0" onchange="calculateTimeFields()" style="max-width:15%;">
            
                &nbsp;
                    
                <label style="max-width:15%; text-align:right;">End:&nbsp;</label>
                <input type="time" id="endTime" onchange="calculateTimeFields()" style="max-width:25%;">
            </div>


            <details id="taskLogOptional" class="optional-section" style="cursor:pointer;">
                <summary>Additional Details</summary>
                <div class="optional-content">


                <div class="form-row" style="text-align:right;">
                    <input type="checkbox" style="width:12px; height:12px;" id="markActivityCompleted">
                    &nbsp;
                    <label>
                        Mark Activity Completed?
                    </label>
                </div>


                </div>
            </details>

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveTaskLog()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal('taskLogModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/task-log.js"></script>

    <script>initializeAppIcon();</script>

    <button class="fab-btn" title="Log New Task" onclick="newTaskLog()">+</button>

</body>
</html>
