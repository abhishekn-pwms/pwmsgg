<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Activity GG Master</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">
                        Activity Master GG
                    </div>
                    <button class="btn btn-primary" onclick="newActivity()">
                        + New Activity
                    </button>
                </div>

                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box" placeholder="Search Activity..." onkeyup="renderActivityGrid()">
                    <select id="statusFilter" onchange="renderActivityGrid()">
                        <option value="Enabled" selected>Enabled</option>
                        <option value="Disabled">Disabled</option>
                        <option value="All">All</option>
                    </select>
                    <select id="activityStatusFilter" onchange="renderActivityGrid()"></select>
                    <select id="activityPriorityFilter" onchange="renderActivityGrid()"></select>
                </div>

                <div id="activityCount" style="margin-bottom:10px; color:#666; font-size:14px;"></div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Activity</th>
                                <th>Context</th>
                                <th>Target Date</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Enabled</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="activityGrid"></tbody>
                    </table>
                </div>

            </div>

        </div> <div id="footer"></div>

    </div>

    <div id="activityModal" class="modal">
        <div class="modal-content">
            <h2>Activity</h2>
            <input type="hidden" id="activityId">

            <div class="form-row">
                <label>Milestone</label>
                <select id="milestoneId"></select>
            </div>

            <div class="form-row">
                <label>Activity Name</label>
                <input id="activityName">
            </div>

            <div class="form-row">
                <label>Description</label>
                <textarea id="description"></textarea>
            </div>

            <div class="form-row">
                <label>Target Date</label>
                <input type="date" id="targetDate">
            </div>

            <div class="form-row">
                <label>Priority</label>
                <select id="activityPriority"></select>
            </div>

            <div class="form-row">
                <label>Status</label>
                <select id="activityStatus"></select>
            </div>

            <div class="form-row">
                <label>Display Order</label>
                <input type="number" id="displayOrder" value="100">
            </div>

            <div class="form-row">
                <label>
                    <input type="checkbox" id="enabled" checked> Enabled
                </label>
            </div>

            <button class="btn btn-primary" onclick="saveActivity()">Save</button>
            <button class="btn btn-secondary" onclick="closeModal('activityModal')">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/activity.js"></script>

    <script>initializeAppIcon();</script>

</body>
</html>
